version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/app/BongDaNgoaiHang.Com
    overwrite: true

permissions:
  - object: /home/ec2-user/app/BongDaNgoaiHang.Com/scripts
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: 755
    type:
      - file

hooks:
  ApplicationStart:
    - location: scripts/codedeploy-start.sh
      timeout: 1200
      runas: ec2-user
