<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài viết | Bóng Đá Ngoại Hạng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/blog.css" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b1220" />
  </head>
  <body class="magazine">
    <header class="mag-masthead mag-masthead-compact">
      <div class="mag-container mag-masthead-row">
        <div class="mag-brand">
          <a class="mag-brand-link" href="/">
            <span class="mag-brand-mark" aria-hidden="true"></span>
            <span class="mag-brand-text">
              <span class="mag-brand-title">Bóng Đá Ngoại Hạng</span>
              <span class="mag-brand-sub">Tin tức - Phân tích - Nhận định</span>
            </span>
          </a>
        </div>
        <div class="mag-masthead-meta">
          <a class="mag-back-home" href="/tin-tuc">← Quay lại Blog</a>
        </div>
      </div>
    </header>

    <main class="mag-container mag-article-wrap">
      <nav class="mag-breadcrumb" aria-label="Đường dẫn">
        <a href="/">Trang chủ</a>
        <span aria-hidden="true">›</span>
        <a href="/tin-tuc">Tin tức</a>
        <span aria-hidden="true">›</span>
        <span id="crumbCategory">Bài viết</span>
      </nav>

      <article class="mag-article">
        <div class="mag-article-eyebrow">
          <span id="articleCategory" class="mag-cat-pill">Tin tức</span>
        </div>
        <h1 id="title" class="mag-article-title"></h1>
        <p id="excerpt" class="mag-article-excerpt"></p>
        <div id="meta" class="mag-article-meta"></div>
        <figure id="coverFigure" class="mag-article-cover">
          <img id="cover" alt="" />
        </figure>
        <div id="content" class="mag-article-body"></div>
      </article>
    </main>

    <footer class="mag-footer">
      <div class="mag-container mag-footer-row">
        <div class="mag-footer-brand">
          <strong>Bóng Đá Ngoại Hạng</strong>
          <span>bongdangoaihang.com</span>
        </div>
        <div class="mag-footer-note">
          Nội dung biên tập độc lập. © <span id="yearNow"></span> Bóng Đá Ngoại Hạng.
        </div>
      </div>
    </footer>

    <script type="module" src="/js/blog-detail.js"></script>
  </body>
</html>
