services:
  bongdangoaihang:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bongdangoaihang-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: bongdangoaihang-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
